<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Million Dollar Homepage</title>
    <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
    <header>
        <h1>Crypto Million Dollar Homepage</h1>
        <div class="stats">1 Pixel Block = 0.001 ETH (Base Mainnet) | Click any 10x10 block to buy</div>
    </header>

    <div id="canvas-container">
        <canvas id="gridCanvas" width="1000" height="1000" aria-label="Pixel purchase canvas"></canvas>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="modal" id="buyModal">
        <h3>Buy Pixel Block</h3>
        <p id="blockCoords">Selected Block: (X, Y)</p>
        <p>Price: <strong>0.001 ETH</strong></p>
        <input type="text" id="imgUrl" placeholder="10x10 Image Link (HTTPS PNG/JPG)" autocomplete="off">
        <input type="text" id="linkUrl" placeholder="Your Website Link (https://...)" autocomplete="off">
        <button id="payBtn" type="button">Pay with Crypto Wallet</button>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.35.0/dist/umd/supabase.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js" crossorigin="anonymous"></script>
    <script type="module" src="./src/app.js"></script>
</body>
</html>
