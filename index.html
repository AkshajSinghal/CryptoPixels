<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Crypto Million Dollar Homepage</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin:0; background:#111; color:#fff; font-family:sans-serif; text-align:center; }
        canvas { border:2px solid #333; background:#000; margin-top:20px; cursor:crosshair; }
    </style>
</head>
<body>
    <h1>The Crypto Million Dollar Homepage</h1>
    <p>Click the grid to buy a 10x10 block for 0.0005 ETH (Base Network)</p>
    <canvas id="gridCanvas" width="1000" height="1000"></canvas>

    <script>
        // Connect to your free Supabase (Grab these from your Supabase settings)
        const supabase = supabase.createClient('YOUR_SUPABASE_URL', 'YOUR_SUPABASE_ANON_KEY');
        const MY_WALLET = "YOUR_PERSONAL_CRYPTO_WALLET_ADDRESS"; 
        
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');

        // 1. Draw bought blocks on load
        async function loadGrid() {
            const { data } = await supabase.from('pixels').select('*');
            if (data) data.forEach(p => {
                const img = new Image(); img.src = p.image_url;
                img.onload = () => ctx.drawImage(img, p.x, p.y, p.width, p.height);
            });
        }

        // 2. Handle Purchase on Click
        canvas.addEventListener('click', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / 10) * 10;
            const y = Math.floor((e.clientY - rect.top) / 10) * 10;

            if (!window.ethereum) return alert("Please install MetaMask!");
            
            // Request user wallet connection
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();

            // Prompt user for their ad assets
            const imgUrl = prompt("Enter your 10x10 Image URL:");
            const linkUrl = prompt("Enter your Website Link URL:");
            if(!imgUrl || !linkUrl) return;

            try {
                // Send transaction directly to your wallet (No gateway, no KYC)
                const tx = await signer.sendTransaction({
                    to: MY_WALLET,
                    value: ethers.utils.parseEther("0.0005") // Roughly $1.50 per block
                });

                alert("Payment processing! Wait for confirmation...");
                await tx.wait(); // Wait for blockchain confirmation

                // Insert directly into database from frontend
                await supabase.from('pixels').insert([
                    { x, y, width: 10, height: 10, image_url: imgUrl, link_url: linkUrl, tx_hash: tx.hash }
                ]);

                alert("Success! Refreshing canvas.");
                loadGrid();
            } catch (err) { alert("Transaction failed or canceled."); }
        });

        loadGrid();
    </script>
</body>
</html>
